<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>DGR-FRAM Modeler</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#fff;color:#1a1a2e;font-family:"Segoe UI",system-ui,sans-serif;font-size:13px}
#app{display:flex;flex-direction:column;height:100vh}

/* TOPBAR */
#tb{display:flex;align-items:center;gap:4px;padding:5px 10px;background:#f4f4f7;border-bottom:1px solid #d4d4e0;flex-shrink:0;flex-wrap:wrap}
.aname{font-size:14px;font-weight:700;color:#534AB7;margin-right:4px;white-space:nowrap}
.sp{width:1px;height:18px;background:#d4d4e0;flex-shrink:0}
.tbtn{display:flex;align-items:center;gap:4px;padding:5px 9px;font-size:12px;border:1px solid #d0d0da;border-radius:5px;cursor:pointer;background:#fff;color:#5a5a7a;white-space:nowrap;transition:all .1s;font-family:inherit}
.tbtn:hover{background:#ebebef;color:#1a1a2e;border-color:#b0b0c0}
.tbtn.on{background:#eeedfe;color:#534AB7;border-color:#534AB7;font-weight:600}
.tbtn.g{color:#0f6e56;border-color:#0f6e56;background:#e1f5ee}
.tbtn.r{color:#c0392b;border-color:#c0392b;background:#fdecea}
.pill{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500;background:#ebebef;color:#5a5a7a;border:1px solid #d0d0da}
.pill.con{background:#e1f5ee;color:#0f6e56;border-color:#0f6e56}
.pill.era{background:#fdecea;color:#c0392b;border-color:#c0392b}
.ifl{display:flex;align-items:center;gap:4px;padding:5px 9px;font-size:12px;border:1px solid #d0d0da;border-radius:5px;cursor:pointer;background:#fff;color:#5a5a7a;white-space:nowrap;transition:all .1s}
.ifl:hover{background:#ebebef}

/* TABS */
#tnav{display:flex;gap:2px;padding:4px 10px;background:#f4f4f7;border-bottom:1px solid #d4d4e0;flex-shrink:0}
.tnav{padding:5px 14px;font-size:12px;font-weight:500;border:1px solid transparent;border-radius:5px;cursor:pointer;color:#5a5a7a;background:transparent;font-family:inherit;transition:all .1s}
.tnav:hover{background:#ebebef;color:#1a1a2e}
.tnav.act{background:#fff;color:#534AB7;border-color:#d0d0da;font-weight:600}

/* LAYOUT */
#main{display:flex;flex:1;overflow:hidden;min-height:0}
#sb{width:210px;background:#f4f4f7;border-right:1px solid #d4d4e0;overflow-y:auto;flex-shrink:0}
#views{flex:1;overflow:hidden;position:relative}
.view{display:none;width:100%;height:100%}
.view.act{display:flex}
#vcanvas{position:relative;overflow:hidden;background:#fff}
canvas{display:block;width:100%;height:100%}
#vmc{overflow-y:auto;background:#fff;flex-direction:column;align-items:flex-start}

/* SIDEBAR */
.ss{padding:8px 10px 6px;border-bottom:1px solid #d4d4e0}
.st{font-size:10px;font-weight:700;color:#9898b0;text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
.si{display:flex;align-items:center;gap:5px;padding:5px 7px;border:1px solid #d4d4e0;border-radius:5px;font-size:12px;margin-bottom:3px;color:#5a5a7a;background:#fff;transition:all .1s}
.si:hover{border-color:#b0b0c0;color:#1a1a2e;background:#f4f4f7}
.si.sel{border-color:#534AB7;background:#eeedfe;color:#534AB7}
.sic{cursor:pointer;flex:1;display:flex;align-items:center;gap:5px;overflow:hidden}
.sdl{font-size:13px;color:#c0c0d0;padding:0 2px;cursor:pointer;line-height:1;border:none;background:none;flex-shrink:0}
.sdl:hover{color:#c0392b}
.sadd{width:100%;padding:5px 7px;font-size:11px;border:1px dashed #d0d0da;border-radius:5px;cursor:pointer;background:transparent;color:#9898b0;margin-top:3px;font-family:inherit;text-align:left;transition:all .1s}
.sadd:hover{border-color:#b0b0c0;color:#5a5a7a;background:#f4f4f7}
.csw{width:10px;height:10px;border-radius:2px;flex-shrink:0;border:1px solid}
.cdot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.se{font-size:11px;color:#9898b0;padding:3px 2px}

/* PANEL */
#pn{position:absolute;right:12px;top:12px;width:270px;background:#fff;border:1px solid #d0d0da;border-radius:10px;z-index:100;max-height:calc(100% - 24px);overflow-y:auto;box-shadow:0 2px 14px rgba(0,0,0,.09);display:none}
.ph{display:flex;align-items:center;justify-content:space-between;padding:10px 13px 8px;border-bottom:1px solid #eee}
.pt{font-size:13px;font-weight:600;color:#1a1a2e}
.pc{cursor:pointer;font-size:18px;color:#9898b0;border:none;background:none;padding:0 2px;line-height:1}
.pb{padding:12px 13px}
.fl{font-size:11px;color:#5a5a7a;display:block;margin-bottom:3px;font-weight:500}
.fi{width:100%;padding:6px 8px;font-size:12px;border:1px solid #d0d0da;border-radius:5px;background:#fff;color:#1a1a2e;font-family:inherit;margin-bottom:8px;outline:none;transition:border-color .1s}
.fi:focus{border-color:#534AB7}
textarea.fi{resize:vertical;min-height:50px}
.fir{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.brow{display:flex;gap:6px;margin-top:10px}
.bsav{flex:1;padding:7px;font-size:12px;border:none;border-radius:5px;background:#534AB7;color:#fff;cursor:pointer;font-weight:500;font-family:inherit}
.bsav:hover{opacity:.85}
.bdel{padding:7px 10px;font-size:12px;border:1px solid #f7c1c1;border-radius:5px;color:#c0392b;background:transparent;cursor:pointer;font-family:inherit}
.bdel:hover{background:#fdecea}
.tgrd{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-bottom:8px}
.ftb{padding:7px 5px;font-size:11px;border:2px solid #e0e0e8;border-radius:6px;cursor:pointer;background:#f8f8fc;color:#7a7a9a;text-align:center;font-family:inherit;transition:all .12s;font-weight:500}
.ftb:hover{border-color:#b0b0c0;color:#1a1a2e}
.ftb.sr{border-color:#c0392b;background:#fff0ee;color:#7a1a10}
.ftb.sg{border-color:#0f6e56;background:#e8f8f0;color:#074030}
.ftb.sh{border-color:#6a6a88;background:#f4f4f8;color:#3a3a55}
.ftb.st2{border-color:#9090b8;background:#f8f8fc;color:#3a3a60}
.cgrd{display:flex;gap:4px;margin-bottom:8px}
.cb{padding:5px 0;font-size:11px;font-weight:600;border:2px solid #e0e0e8;border-radius:5px;cursor:pointer;background:#f8f8fc;color:#9898b0;font-family:inherit;transition:all .12s;flex:1;text-align:center}
.cb:hover{border-color:#b0b0c0;color:#1a1a2e}
.cb.c1{border-color:#0f6e56;background:#e8f8f0;color:#074030}
.cb.c2{border-color:#854f0b;background:#faeeda;color:#4a2c06}
.cb.c3{border-color:#c0392b;background:#fdecea;color:#7a1a10}
.cb.c4{border-color:#7c0000;background:#f5dddd;color:#4a0000}
.dv{height:1px;background:#eee;margin:9px 0}

/* LEGEND */
#leg{position:absolute;left:12px;bottom:12px;background:rgba(255,255,255,.96);border:1px solid #d4d4e0;border-radius:8px;padding:7px 11px;font-size:11px;color:#5a5a7a;z-index:50;pointer-events:none}
.lr{display:flex;align-items:center;gap:6px;margin-bottom:3px}
.lr:last-child{margin-bottom:0}
.lb{width:11px;height:11px;border-radius:2px;border:1.5px solid;flex-shrink:0}

/* TOOLTIP */
#tip{position:absolute;background:#fff;border:1px solid #d0d0da;color:#1a1a2e;padding:6px 10px;border-radius:6px;font-size:11px;pointer-events:none;z-index:200;display:none;max-width:220px;line-height:1.5;box-shadow:0 2px 8px rgba(0,0,0,.1)}

/* MODAL */
#ov{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:300;display:none;align-items:center;justify-content:center}
.modal{background:#fff;border:1px solid #d0d0da;border-radius:10px;padding:18px;width:290px;box-shadow:0 4px 20px rgba(0,0,0,.12)}
.modal h3{font-size:14px;font-weight:600;margin-bottom:3px}
.msub{font-size:12px;color:#5a5a7a;margin-bottom:12px}
.mac{display:flex;gap:7px;margin-top:12px}

/* MC VIEW */
.mcw{padding:20px;width:100%;max-width:1020px}
.pgtit{font-size:18px;font-weight:700;margin-bottom:4px}
.pgsub{font-size:12px;color:#5a5a7a;margin-bottom:16px;line-height:1.6}
.infobox{background:#eeedfe;border:1px solid #c8c5f8;border-radius:7px;padding:11px 14px;margin-bottom:14px;font-size:12px;color:#3a3470;line-height:1.65}
.help-lnk{font-size:11px;color:#534AB7;cursor:pointer;text-decoration:underline;margin-bottom:12px;display:inline-block}

/* PARAM CARDS GRID */
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px;margin-bottom:18px}
.pcard{background:#f8f8fc;border:1px solid #d4d4e0;border-radius:8px;padding:13px 15px}
.pcard-title{font-size:13px;font-weight:600;margin-bottom:11px;display:flex;align-items:center;gap:8px}
.pgrp{margin-bottom:9px}
.pgrp-lbl{font-size:11px;font-weight:700;display:block;margin-bottom:5px}
.prow{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px}
.pcell{display:flex;flex-direction:column;gap:2px}
.pcell label{font-size:10px;color:#9898b0;font-weight:500}
.pinp{width:100%;padding:5px 6px;font-size:12px;border:1px solid #d0d0da;border-radius:4px;text-align:center;font-family:inherit;outline:none;background:#fff;color:#1a1a2e}
.pinp:focus{border-color:#534AB7}
.pinp.err{border-color:#c0392b;background:#fdecea}

/* RUN ROW */
.runrow{display:flex;align-items:center;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.itb{padding:6px 12px;font-size:12px;font-weight:600;border:2px solid #d0d0da;border-radius:5px;cursor:pointer;background:#fff;color:#5a5a7a;transition:all .1s;font-family:inherit}
.itb:hover{border-color:#534AB7;color:#534AB7}
.itb.on{border-color:#534AB7;background:#eeedfe;color:#534AB7}

/* RESULTS */
.rtabs{display:flex;gap:4px;margin-bottom:10px;flex-wrap:wrap}
.rtab{padding:5px 12px;font-size:11px;font-weight:600;border:1px solid #d0d0da;border-radius:20px;cursor:pointer;background:#fff;color:#5a5a7a;font-family:inherit;transition:all .1s}
.rtab:hover{background:#ebebef}
.rtab.on{background:#eeedfe;color:#534AB7;border-color:#534AB7}
.restit{font-size:14px;font-weight:600;margin-bottom:9px;color:#1a1a2e}
.rcard{display:flex;align-items:center;gap:9px;padding:9px 12px;border:1px solid #d4d4e0;border-radius:7px;margin-bottom:5px;background:#fff}
.rcard:hover{border-color:#b0b0c0}
.rnum{font-size:15px;font-weight:700;color:#b0b0c0;min-width:22px;text-align:center}
.rname{flex:1;font-size:12px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rbar{width:120px}
.rbarbg{height:7px;border-radius:4px;background:#e8e8f0;overflow:hidden}
.rbarfill{height:100%;border-radius:4px;transition:width .4s}
.rval{font-size:12px;font-weight:700;min-width:44px;text-align:right}
.cbadge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:700}
.cb-b{background:#e8f8f0;color:#0f6e56;border:1px solid #0f6e56}
.cb-m{background:#faeeda;color:#854f0b;border:1px solid #854f0b}
.cb-a{background:#fdecea;color:#c0392b;border:1px solid #c0392b}
.cb-c{background:#f5dddd;color:#7c0000;border:1px solid #7c0000}

/* DETAIL GRID */
.dgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:12px;margin-bottom:20px}
.dc{background:#f8f8fc;border:1px solid #d4d4e0;border-radius:8px;padding:13px 15px}
.dc-head{font-size:13px;font-weight:600;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.sgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:9px}
.sbox{background:#fff;border:1px solid #e0e0e8;border-radius:5px;padding:7px 5px;text-align:center}
.sval{font-size:17px;font-weight:700;display:block}
.slbl{font-size:10px;color:#9898b0}
.probrow{font-size:11px;margin-bottom:8px}
.histwrap{margin-top:6px}
.histbars{display:flex;align-items:flex-end;gap:2px;height:68px}
.hb{border-radius:2px 2px 0 0;flex:1;min-width:0;transition:height .3s}
.histax{display:flex;justify-content:space-between;font-size:9px;color:#9898b0;margin-top:2px}

::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:#f4f4f7}
::-webkit-scrollbar-thumb{background:#c8c8d8;border-radius:3px}
</style>
</head>
<body>
<div id="app">

<!-- TOPBAR -->
<div id="tb">
  <span class="aname">DGR-FRAM</span>
  <span class="sp"></span>
  <button class="tbtn on" id="bsel" onclick="setMode('select')">↖ Selecionar</button>
  <button class="tbtn" id="bcon" onclick="setMode('connect')">⟿ Conectar</button>
  <button class="tbtn" id="bera" onclick="setMode('erase')">✕ Apagar</button>
  <span class="sp"></span>
  <button class="tbtn" onclick="addFn()">＋ Função</button>
  <button class="tbtn" onclick="addVar()">⚡ Variabilidade</button>
  <button class="tbtn" onclick="addRes()">∿ Ressonância</button>
  <span class="sp"></span>
  <button class="tbtn" onclick="expJSON()">⬇ JSON</button>
  <button class="tbtn" onclick="expPNG()">⬇ PNG</button>
  <button class="tbtn" onclick="expPDF()">⬇ PDF</button>
  <label class="ifl">⬆ JSON<input type="file" accept=".json" onchange="impJSON(event)" style="display:none"></label>
  <label class="ifl">⬆ XFMV<input type="file" accept=".xfmv" onchange="impXFMV(event)" style="display:none"></label>
  <span class="sp"></span>
  <button class="tbtn r" onclick="clearAll()">⊘ Limpar</button>
  <span class="sp"></span>
  <span class="pill" id="mpill">Selecionar</span>
</div>

<!-- TABS -->
<div id="tnav">
  <button class="tnav act" onclick="switchTab('canvas')">🗺 Diagrama FRAM</button>
  <button class="tnav" onclick="switchTab('mc')">🎲 Monte Carlo</button>
</div>

<div id="main">
  <div id="sb">
    <div class="ss"><div class="st">Funções</div><div id="sbf"></div><button class="sadd" onclick="addFn()">＋ Nova função</button></div>
    <div class="ss"><div class="st">Acoplamentos</div><div id="sbc"></div></div>
    <div class="ss"><div class="st">Variabilidades</div><div id="sbv"></div></div>
    <div class="ss"><div class="st">Eventos de Ressonância</div><div id="sbr"></div></div>
  </div>

  <div id="views">
    <!-- DIAGRAM -->
    <div class="view act" id="vcanvas">
      <canvas id="c"></canvas>
      <div id="tip"></div>
      <div id="leg">
        <div class="lr"><div class="lb" style="background:#fff0ee;border-color:#c0392b"></div>Organizacional</div>
        <div class="lr"><div class="lb" style="background:#e8f8f0;border-color:#0f6e56"></div>Background</div>
        <div class="lr"><div class="lb" style="background:#f4f4f8;border-color:#6a6a88"></div>Humana</div>
        <div class="lr"><div class="lb" style="background:#f8f8fc;border-color:#9090b8"></div>Tecnológica</div>
        <div class="lr" style="margin-top:4px">
          <svg width="26" height="12" style="flex-shrink:0"><path d="M2 6 Q6.5 2 13 6 Q19.5 10 24 6" fill="none" stroke="#c0392b" stroke-width="1.5"/></svg>Ressonância
        </div>
      </div>
    </div>
    <!-- MC -->
    <div class="view" id="vmc">
      <div class="mcw" id="mc-inner"></div>
    </div>
  </div>
</div>
</div>

<!-- PANEL -->
<div id="pn">
  <div class="ph"><span class="pt" id="ptitle"></span><button class="pc" onclick="closePn()">×</button></div>
  <div class="pb" id="pbody"></div>
</div>

<!-- MODAL coupling -->
<div id="ov">
  <div class="modal">
    <h3>Definir acoplamento</h3>
    <div class="msub" id="cinfo"></div>
    <label class="fl">Aspecto de ORIGEM</label>
    <select class="fi" id="csrc">
      <option value="O">O — Output</option><option value="I">I — Input</option>
      <option value="P">P — Precondição</option><option value="R">R — Recurso</option>
      <option value="C">C — Controle</option><option value="T">T — Tempo</option>
    </select>
    <label class="fl">Aspecto de DESTINO</label>
    <select class="fi" id="ctgt">
      <option value="I">I — Input</option><option value="O">O — Output</option>
      <option value="P">P — Precondição</option><option value="R">R — Recurso</option>
      <option value="C">C — Controle</option><option value="T">T — Tempo</option>
    </select>
    <label class="fl">Rótulo</label>
    <input type="text" class="fi" id="clbl" placeholder="ex: alimenta, controla">
    <label class="fl">Tipo de linha</label>
    <select class="fi" id="ctype">
      <option value="normal">Normal</option><option value="variable">Variável (tracejado)</option>
      <option value="critical">Crítico (vermelho)</option>
    </select>
    <div class="mac">
      <button class="bsav" onclick="confirmConn()">Criar</button>
      <button class="bdel" onclick="cancelConn()">Cancelar</button>
    </div>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════════
let fns=[], coups=[], vars=[], resEvs=[], govM=[];
// params[id] = {ve:{mn,mp,mx}, vx:{mn,mp,mx}, ar:{mn,mp,mx}}
let params={};
let mcRes={};
let mcN=5000, rankBy='p95', showHelp=false;
let mode='select', selFn=null;
let dragFn=null,dragOX=0,dragOY=0,dragging=false;
let panX=0,panY=0,scale=1,isPan=false,pSX=0,pSY=0;
let connSrc=null,connPend=null,connSrcFn=null,connTgtFn=null;
let hovFn=null,hovCoup=null,animT=0,animOn=false;
let curTab='canvas';

const C=document.getElementById('c');
const ctx=C.getContext('2d');
const CW=document.getElementById('vcanvas');
const tip=document.getElementById('tip');
function resize(){C.width=CW.offsetWidth;C.height=CW.offsetHeight;draw();}
window.addEventListener('resize',resize);

// ════════════════════════════════════════════════════
// DEFAULT PARAMS
// ════════════════════════════════════════════════════
function initP(id){
  if(!params[id]) params[id]={
    ve:{mn:0.10,mp:0.30,mx:0.60},
    vx:{mn:0.10,mp:0.30,mx:0.60},
    ar:{mn:0.20,mp:0.40,mx:0.70}
  };
}

// ════════════════════════════════════════════════════
// TABS
// ════════════════════════════════════════════════════
function switchTab(t){
  curTab=t;
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('act'));
  document.querySelectorAll('.tnav').forEach(b=>b.classList.remove('act'));
  document.getElementById('v'+t).classList.add('act');
  document.querySelectorAll('.tnav')[['canvas','mc'].indexOf(t)].classList.add('act');
  if(t==='canvas') resize();
  if(t==='mc'){saveDOMParams();renderMC();}
}

// ════════════════════════════════════════════════════
// HEX GEOMETRY (flat-top)
// vertices at i×60°:  O=0° R=60° T=120° I=180° C=240° P=300°
// ════════════════════════════════════════════════════
const HR=46;
const AV={O:0,R:1,T:2,I:3,C:4,P:5};
const AC={I:'#185fa5',O:'#0f6e56',P:'#b07a10',R:'#5f5e5a',C:'#c0392b',T:'#534AB7'};

function hexV(cx,cy,r){
  const v=[];
  for(let i=0;i<6;i++){const a=i*Math.PI/3;v.push([cx+r*Math.cos(a),cy+r*Math.sin(a)]);}
  return v;
}
function aspW(wx,wy,asp){const a=(AV[asp]??0)*Math.PI/3;return[wx+HR*Math.cos(a),wy+HR*Math.sin(a)];}
function aspS(wx,wy,asp){const[px,py]=aspW(wx,wy,asp);return[px*scale+panX,py*scale+panY];}
function inHex(px,py,cx,cy){return Math.hypot(px-cx,py-cy)<HR*0.92;}
function w2s(wx,wy){return[wx*scale+panX,wy*scale+panY];}
function s2w(sx,sy){return[(sx-panX)/scale,(sy-panY)/scale];}

// ════════════════════════════════════════════════════
// COLORS
// ════════════════════════════════════════════════════
const FC={
  red:  {fill:'#fff0ee',stroke:'#c0392b',text:'#7a1a10',badge:'ORG'},
  green:{fill:'#e8f8f0',stroke:'#0f6e56',text:'#074030',badge:'BKG'},
  grey: {fill:'#f4f4f8',stroke:'#6a6a88',text:'#3a3a55',badge:'HUM'},
  white:{fill:'#f8f8fc',stroke:'#9090b8',text:'#3a3a60',badge:'TEC'},
};
function fnCol(fn){
  if(selFn&&fn.id===selFn.id) return{fill:'#eeedfe',stroke:'#534AB7',text:'#26215c',badge:(FC[fn.style||'red']||FC.red).badge};
  return FC[fn.style||'red']||FC.red;
}

// ════════════════════════════════════════════════════
// DRAW
// ════════════════════════════════════════════════════
function draw(){
  const W=C.width,H=C.height;
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#fff';ctx.fillRect(0,0,W,H);
  // Grid
  ctx.save();ctx.strokeStyle='rgba(0,0,0,0.04)';ctx.lineWidth=1;
  const gs=50*scale,ox=panX%gs,oy=panY%gs;
  for(let x=ox;x<W;x+=gs){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=oy;y<H;y+=gs){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  ctx.restore();
  const rids=resonantIds();
  coups.forEach(c=>drawCoup(c));
  if(mode==='connect'&&connSrc&&connPend){
    const[sx,sy]=w2s(connSrc.x,connSrc.y);
    ctx.save();ctx.strokeStyle='#0f6e56';ctx.lineWidth=1.5;ctx.setLineDash([6,4]);
    ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(connPend.x,connPend.y);ctx.stroke();ctx.setLineDash([]);ctx.restore();
  }
  fns.forEach(fn=>drawFn(fn,rids.has(fn.id)));
  if(rids.size>0&&!animOn){animOn=true;animLoop();}
  else if(rids.size===0) animOn=false;
}
function animLoop(){if(!animOn)return;animT++;draw();requestAnimationFrame(animLoop);}

function drawFn(fn,hasRes){
  const[cx,cy]=w2s(fn.x,fn.y),r=HR*scale;
  const col=fnCol(fn);
  const isSel=selFn&&fn.id===selFn.id,isHov=hovFn&&fn.id===hovFn.id,isEra=mode==='erase';
  const verts=hexV(cx,cy,r);
  ctx.save();
  ctx.beginPath();ctx.moveTo(verts[0][0],verts[0][1]);
  for(let i=1;i<6;i++) ctx.lineTo(verts[i][0],verts[i][1]);
  ctx.closePath();
  ctx.fillStyle=col.fill;ctx.fill();
  ctx.strokeStyle=isEra&&isHov?'#c0392b':col.stroke;
  ctx.lineWidth=isSel||isHov?2.5:1.5;
  if(isEra&&isHov)ctx.setLineDash([4,3]);
  ctx.stroke();ctx.setLineDash([]);
  // Sinusoid clipped inside hex
  if(hasRes){
    ctx.save();ctx.strokeStyle='#c0392b';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(verts[0][0],verts[0][1]);
    for(let i=1;i<6;i++)ctx.lineTo(verts[i][0],verts[i][1]);
    ctx.closePath();ctx.clip();
    const amp=r*0.13,freq=3.8,bw=r*0.68;
    ctx.beginPath();
    for(let x=-bw;x<=bw;x+=1){const yy=cy+amp*Math.sin(freq*(x/bw)*Math.PI+animT*0.08);if(x===-bw)ctx.moveTo(cx+x,yy);else ctx.lineTo(cx+x,yy);}
    ctx.stroke();ctx.restore();
  }
  // Name
  ctx.fillStyle=col.text;
  const fs=Math.max(9,11*Math.min(scale,1));
  ctx.font=`500 ${fs}px "Segoe UI",system-ui`;ctx.textAlign='center';ctx.textBaseline='middle';
  const words=(fn.name||'').split(' ');const lines=[];let cur='';
  words.forEach(w=>{const t=cur?cur+' '+w:w;if(ctx.measureText(t).width>r*1.42){if(cur)lines.push(cur);cur=w;}else cur=t;});
  lines.push(cur);
  const lh=Math.max(12,fs*1.3),tot=(lines.length-1)*lh,yOff=hasRes?-r*0.2:0;
  lines.forEach((l,i)=>ctx.fillText(l,cx,cy+yOff-tot/2+i*lh));
  ctx.font=`600 ${Math.max(8,9*Math.min(scale,1))}px "Segoe UI",system-ui`;
  ctx.fillStyle=col.stroke;ctx.fillText(col.badge,cx,cy+r*0.56);
  ctx.restore();
  // Aspect dots
  const used=new Set();
  coups.forEach(c=>{if(c.source_function_id===fn.id)used.add(c.source_aspect||'O');if(c.target_function_id===fn.id)used.add(c.target_aspect||'I');});
  if(isSel||isHov){
    ['I','O','P','R','C','T'].forEach(asp=>{
      const[ax,ay]=aspS(fn.x,fn.y,asp),rs=Math.max(5,6*scale);
      ctx.save();ctx.beginPath();ctx.arc(ax,ay,rs,0,Math.PI*2);ctx.fillStyle=AC[asp];ctx.fill();
      ctx.strokeStyle='#fff';ctx.lineWidth=1.2;ctx.stroke();
      ctx.fillStyle='#fff';ctx.font=`700 ${Math.max(6,7*scale)}px monospace`;
      ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(asp,ax,ay);ctx.restore();
    });
  } else {
    used.forEach(asp=>{
      const[ax,ay]=aspS(fn.x,fn.y,asp);
      ctx.save();ctx.beginPath();ctx.arc(ax,ay,Math.max(3.5,4.5*scale),0,Math.PI*2);ctx.fillStyle=AC[asp];ctx.fill();ctx.restore();
    });
  }
}

function drawCoup(c){
  const src=fns.find(f=>f.id===c.source_function_id),tgt=fns.find(f=>f.id===c.target_function_id);
  if(!src||!tgt)return;
  const[sx,sy]=aspS(src.x,src.y,c.source_aspect||'O');
  const[tx,ty]=aspS(tgt.x,tgt.y,c.target_aspect||'I');
  const dx=tx-sx,dy=ty-sy,len=Math.hypot(dx,dy)||1;
  const off=Math.min(60*scale,len*0.30);
  const cpx=(sx+tx)/2-(dy/len)*off,cpy=(sy+ty)/2+(dx/len)*off;
  const lt=c.line_type||'normal';
  const isHovC=hovCoup&&hovCoup.id===c.id&&mode==='erase';
  ctx.save();
  ctx.beginPath();ctx.moveTo(sx,sy);ctx.quadraticCurveTo(cpx,cpy,tx,ty);
  if(lt==='variable')ctx.setLineDash([6,4]);
  ctx.strokeStyle=isHovC?'#c0392b':lt==='critical'?'#c0392b':'rgba(80,80,140,0.5)';
  ctx.lineWidth=isHovC?2.2:lt==='critical'?1.8:1.1;ctx.stroke();ctx.setLineDash([]);
  // Arrow
  const t2=0.97,ax=(1-t2)**2*sx+2*(1-t2)*t2*cpx+t2**2*tx,ay2=(1-t2)**2*sy+2*(1-t2)*t2*cpy+t2**2*ty;
  const t1=0.91,bx=(1-t1)**2*sx+2*(1-t1)*t1*cpx+t1**2*tx,by=(1-t1)**2*sy+2*(1-t1)*t1*cpy+t1**2*ty;
  const ang=Math.atan2(ay2-by,ax-bx),al=8*Math.min(scale,1.2);
  ctx.beginPath();ctx.moveTo(ax,ay2);
  ctx.lineTo(ax-al*Math.cos(ang-.45),ay2-al*Math.sin(ang-.45));
  ctx.lineTo(ax-al*Math.cos(ang+.45),ay2-al*Math.sin(ang+.45));
  ctx.closePath();
  ctx.fillStyle=isHovC?'#c0392b':lt==='critical'?'#c0392b':'rgba(80,80,140,0.6)';ctx.fill();
  if(c.label){
    const lx=(sx+tx)/2-(dy/len)*off*0.5,ly=(sy+ty)/2+(dx/len)*off*0.5-10*Math.min(scale,1);
    ctx.font='10px "Segoe UI",system-ui';ctx.fillStyle='rgba(60,60,110,0.7)';ctx.textAlign='center';ctx.fillText(c.label,lx,ly);
  }
  ctx.restore();
}

function resonantIds(){
  const s=new Set();
  resEvs.forEach(r=>{if(r.initial_function_id)s.add(r.initial_function_id);(r.affected_function_ids||[]).forEach(id=>s.add(id));});
  return s;
}

function hitCoup(mx,my){
  for(const c of coups){
    const src=fns.find(f=>f.id===c.source_function_id),tgt=fns.find(f=>f.id===c.target_function_id);
    if(!src||!tgt)continue;
    const[sx,sy]=aspS(src.x,src.y,c.source_aspect||'O'),[tx,ty]=aspS(tgt.x,tgt.y,c.target_aspect||'I');
    const dx=tx-sx,dy=ty-sy,len=Math.hypot(dx,dy)||1,off=Math.min(60*scale,len*0.30);
    const cpx=(sx+tx)/2-(dy/len)*off,cpy=(sy+ty)/2+(dx/len)*off;
    for(let t=0;t<=1;t+=0.035){
      const bx=(1-t)**2*sx+2*(1-t)*t*cpx+t**2*tx,by=(1-t)**2*sy+2*(1-t)*t*cpy+t**2*ty;
      if(Math.hypot(mx-bx,my-by)<9)return c;
    }
  }
  return null;
}

// ════════════════════════════════════════════════════
// MOUSE
// ════════════════════════════════════════════════════
C.addEventListener('mousedown',onDown);
C.addEventListener('mousemove',onMove);
C.addEventListener('mouseup',()=>{dragFn=null;dragging=false;isPan=false;});
C.addEventListener('wheel',e=>{e.preventDefault();const d=e.deltaY>0?.88:1.14;panX=(panX-e.offsetX)*d+e.offsetX;panY=(panY-e.offsetY)*d+e.offsetY;scale=Math.max(0.2,Math.min(3,scale*d));draw();},{passive:false});
C.addEventListener('dblclick',e=>{const[wx,wy]=s2w(e.offsetX,e.offsetY);const fn=fns.find(f=>inHex(wx,wy,f.x,f.y));if(fn)openFnPn(fn);});

function onDown(e){
  const[wx,wy]=s2w(e.offsetX,e.offsetY);
  const fn=fns.find(f=>inHex(wx,wy,f.x,f.y));
  if(mode==='erase'){
    if(fn){delFn(fn.id);return;}
    const c=hitCoup(e.offsetX,e.offsetY);if(c){coups=coups.filter(x=>x.id!==c.id);renderSB();draw();}return;
  }
  if(mode==='select'){
    if(fn){dragFn=fn;dragOX=wx-fn.x;dragOY=wy-fn.y;dragging=false;selFn=fn;openFnPn(fn);renderSB();draw();}
    else{dragFn=null;selFn=null;closePn();isPan=true;pSX=e.offsetX-panX;pSY=e.offsetY-panY;renderSB();draw();}
  } else if(mode==='connect'){
    if(fn){if(!connSrc){connSrc=fn;draw();}else if(fn.id!==connSrc.id){openConnModal(connSrc,fn);}else{connSrc=null;draw();}}
    else{connSrc=null;draw();}
  }
}
function onMove(e){
  const[wx,wy]=s2w(e.offsetX,e.offsetY);
  if(isPan){panX=e.offsetX-pSX;panY=e.offsetY-pSY;draw();return;}
  if(dragFn&&mode==='select'){if(Math.hypot(wx-dragFn.x-dragOX,wy-dragFn.y-dragOY)>2)dragging=true;dragFn.x=wx-dragOX;dragFn.y=wy-dragOY;draw();return;}
  if(mode==='connect'&&connSrc)connPend={x:e.offsetX,y:e.offsetY};
  const fn=fns.find(f=>inHex(wx,wy,f.x,f.y));
  if(fn!==hovFn){hovFn=fn;draw();}
  const c=mode==='erase'?hitCoup(e.offsetX,e.offsetY):null;
  if(c!==hovCoup){hovCoup=c;draw();}
  if(fn){
    tip.style.display='block';tip.style.left=(e.offsetX+14)+'px';tip.style.top=(e.offsetY-10)+'px';
    const v=vars.find(v=>v.affected_function_id===fn.id);
    let h=`<b>${esc(fn.name)}</b>`;if(fn.description)h+=`<br>${esc(fn.description.slice(0,80))}`;if(v)h+=`<br>⚡ ${esc(v.variability_type)}`;
    if(mode==='erase')h+='<br><span style="color:#c0392b">Clique para apagar</span>';tip.innerHTML=h;
  } else if(c&&mode==='erase'){
    tip.style.display='block';tip.style.left=(e.offsetX+14)+'px';tip.style.top=(e.offsetY-10)+'px';
    const s=fns.find(f=>f.id===c.source_function_id),t=fns.find(f=>f.id===c.target_function_id);
    tip.innerHTML=`${esc(s?.name||'?')} → ${esc(t?.name||'?')}<br><span style="color:#c0392b">Clique para apagar</span>`;
  } else tip.style.display='none';
  C.style.cursor=mode==='erase'?(fn||c?'crosshair':'default'):mode==='connect'?'crosshair':'default';
}

// ════════════════════════════════════════════════════
// MONTE CARLO
// ════════════════════════════════════════════════════
function tri(mn,mp,mx){
  mn=Math.max(0,Math.min(1,+mn||0));mp=Math.max(mn,Math.min(1,+mp||0));mx=Math.max(mp,Math.min(1,+mx||1));
  if(mx===mn)return mp;
  const u=Math.random(),fc=(mp-mn)/(mx-mn);
  return u<fc?mn+Math.sqrt(u*(mx-mn)*(mp-mn)):mx-Math.sqrt((1-u)*(mx-mn)*(mx-mp));
}
function outDeg(id){return coups.filter(c=>c.source_function_id===id).length;}
function maxOutDeg(){return Math.max(1,...fns.map(fn=>outDeg(fn.id)));}

function doMC(){
  const N=mcN,maxOD=maxOutDeg();
  fns.forEach(fn=>{
    initP(fn.id);const p=params[fn.id];
    const vfrs=[];
    for(let i=0;i<N;i++){
      const VE=tri(p.ve.mn,p.ve.mp,p.ve.mx);
      const VX=tri(p.vx.mn,p.vx.mp,p.vx.mx);
      const AR=tri(p.ar.mn,p.ar.mp,p.ar.mx);
      vfrs.push(Math.max(0,Math.min(2,(VE+VX)*(1-AR))));
    }
    vfrs.sort((a,b)=>a-b);
    const mean=vfrs.reduce((s,v)=>s+v,0)/N;
    const p90=vfrs[Math.floor(N*0.90)];
    const p95=vfrs[Math.floor(N*0.95)];
    const p99=vfrs[Math.floor(N*0.99)];
    const lcrit=p95;
    const probCrit=vfrs.filter(v=>v>=lcrit).length/N;
    const ip=outDeg(fn.id)/maxOD;
    const iis=mean*ip;
    // Histogram: 20 bins 0–1 (cap at 1 for display)
    const hist=Array(20).fill(0);
    vfrs.forEach(v=>hist[Math.min(19,Math.floor(Math.min(v,0.9999)*20))]++);
    const hmax=Math.max(...hist)||1;
    mcRes[fn.id]={mean,p90,p95,p99,lcrit,probCrit,ip,iis,n:N,min:vfrs[0],max:vfrs[N-1],median:vfrs[Math.floor(N/2)],hist:hist.map(h=>h/hmax)};
  });
}

function critInfo(v){
  if(v>=0.70)return{cls:'cb-c',lbl:'Crítica'};
  if(v>=0.50)return{cls:'cb-a',lbl:'Alta'};
  if(v>=0.30)return{cls:'cb-m',lbl:'Moderada'};
  return{cls:'cb-b',lbl:'Baixa'};
}
function vColor(v){
  if(v>=0.70)return'#c0392b';
  if(v>=0.50)return'#854f0b';
  if(v>=0.30)return'#534AB7';
  return'#0f6e56';
}
function pct(v,dec=1){return(v*100).toFixed(dec)+'%';}

function saveDOMParams(){
  document.querySelectorAll('.pinp').forEach(inp=>{
    const id=inp.dataset.fn,v=inp.dataset.v,f=inp.dataset.f;
    if(!id||!v||!f)return;
    initP(id);
    params[id][v][f]=Math.max(0,Math.min(1,parseFloat(inp.value)||0));
  });
}
function saveP(inp){
  const id=inp.dataset.fn,v=inp.dataset.v,f=inp.dataset.f;
  if(!id||!v||!f)return;
  initP(id);params[id][v][f]=Math.max(0,Math.min(1,parseFloat(inp.value)||0));
}
function validateP(inp){
  const row=inp.closest('.prow');if(!row)return;
  const ins=row.querySelectorAll('.pinp');
  const mn=+ins[0].value,mp=+ins[1].value,mx=+ins[2].value;
  ins.forEach(i=>i.classList.toggle('err',!(mn<=mp&&mp<=mx&&mn>=0&&mx<=1)));
}

function expPNG(){
  let mnX=Infinity,mnY=Infinity,mxX=-Infinity,mxY=-Infinity;
  fns.forEach(fn=>{mnX=Math.min(mnX,fn.x-HR*1.8);mnY=Math.min(mnY,fn.y-HR*1.8);mxX=Math.max(mxX,fn.x+HR*1.8);mxY=Math.max(mxY,fn.y+HR*1.8);});
  if(!fns.length){mnX=0;mnY=0;mxX=800;mxY=600;}
  const M=60,W=(mxX-mnX+M*2)*2,H=(mxY-mnY+M*2)*2;

  oc.toBlob(b=>{const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download='dgr-fram.png';a.click();URL.revokeObjectURL(u);},'image/png');
}

function renderOff(W,H,px,py,sc){
  const oc=document.createElement('canvas');oc.width=W;oc.height=H;
  const g=oc.getContext('2d');
  g.fillStyle='#fff';g.fillRect(0,0,W,H);
  g.strokeStyle='rgba(0,0,0,0.04)';g.lineWidth=1;
  const gs=50*sc,ox=px%gs,oy=py%gs;
  for(let x=ox;x<W;x+=gs){g.beginPath();g.moveTo(x,0);g.lineTo(x,H);g.stroke();}
  for(let y=oy;y<H;y+=gs){g.beginPath();g.moveTo(0,y);g.lineTo(W,y);g.stroke();}
  const ws=(wx,wy)=>[wx*sc+px,wy*sc+py];
  const apS2=(wx,wy,asp)=>{const a=(AV[asp]??0)*Math.PI/3;const[bx,by]=[wx+HR*Math.cos(a),wy+HR*Math.sin(a)];return ws(bx,by);};
  const rids=resonantIds();
  coups.forEach(c=>{
    const src=fns.find(f=>f.id===c.source_function_id),tgt=fns.find(f=>f.id===c.target_function_id);if(!src||!tgt)return;
    const[sx,sy]=apS2(src.x,src.y,c.source_aspect||'O'),[tx,ty]=apS2(tgt.x,tgt.y,c.target_aspect||'I');
    const dx=tx-sx,dy=ty-sy,len=Math.hypot(dx,dy)||1,off=Math.min(60*sc,len*0.30);
    const cpx=(sx+tx)/2-(dy/len)*off,cpy=(sy+ty)/2+(dx/len)*off;
    const lt=c.line_type||'normal';
    g.save();g.beginPath();g.moveTo(sx,sy);g.quadraticCurveTo(cpx,cpy,tx,ty);
    if(lt==='variable')g.setLineDash([6,4]);
    g.strokeStyle=lt==='critical'?'#c0392b':'rgba(80,80,140,0.5)';g.lineWidth=lt==='critical'?1.8:1.1;g.stroke();g.setLineDash([]);
    const t2=0.97,ax=(1-t2)**2*sx+2*(1-t2)*t2*cpx+t2**2*tx,ay2=(1-t2)**2*sy+2*(1-t2)*t2*cpy+t2**2*ty;
    const t1=0.91,bx2=(1-t1)**2*sx+2*(1-t1)*t1*cpx+t1**2*tx,by2=(1-t1)**2*sy+2*(1-t1)*t1*cpy+t1**2*ty;
    const ang=Math.atan2(ay2-by2,ax-bx2),al=8*Math.min(sc,1.2);
    g.beginPath();g.moveTo(ax,ay2);g.lineTo(ax-al*Math.cos(ang-.45),ay2-al*Math.sin(ang-.45));g.lineTo(ax-al*Math.cos(ang+.45),ay2-al*Math.sin(ang+.45));g.closePath();
    g.fillStyle=lt==='critical'?'#c0392b':'rgba(80,80,140,0.6)';g.fill();
    if(c.label){g.font='10px "Segoe UI",system-ui';g.fillStyle='rgba(60,60,110,0.7)';g.textAlign='center';g.fillText(c.label,(sx+tx)/2-(dy/len)*off*0.5,(sy+ty)/2+(dx/len)*off*0.5-10);}
    g.restore();
  });
  fns.forEach(fn=>{
    const[cx,cy]=ws(fn.x,fn.y),r=HR*sc;const col=FC[fn.style||'red']||FC.red;
    const verts=[];for(let i=0;i<6;i++){const a=i*Math.PI/3;verts.push([cx+r*Math.cos(a),cy+r*Math.sin(a)]);}
    g.save();g.beginPath();g.moveTo(verts[0][0],verts[0][1]);for(let i=1;i<6;i++)g.lineTo(verts[i][0],verts[i][1]);g.closePath();
    g.fillStyle=col.fill;g.fill();g.strokeStyle=col.stroke;g.lineWidth=1.5;g.stroke();
    if(rids.has(fn.id)){
      g.save();g.strokeStyle='#c0392b';g.lineWidth=1.5;
      g.beginPath();g.moveTo(verts[0][0],verts[0][1]);for(let i=1;i<6;i++)g.lineTo(verts[i][0],verts[i][1]);g.closePath();g.clip();
      const amp=r*0.13,freq=3.8,bw=r*0.68;
      g.beginPath();for(let x=-bw;x<=bw;x+=1){const yy=cy+amp*Math.sin(freq*(x/bw)*Math.PI);if(x===-bw)g.moveTo(cx+x,yy);else g.lineTo(cx+x,yy);}g.stroke();g.restore();
    }
    g.fillStyle=col.text;const fs=11*Math.min(sc,1);g.font=`500 ${Math.max(9,fs)}px "Segoe UI",system-ui`;g.textAlign='center';g.textBaseline='middle';
    const words=(fn.name||'').split(' ');const lines=[];let cur='';
    words.forEach(w=>{const t=cur?cur+' '+w:w;if(g.measureText(t).width>r*1.42){if(cur)lines.push(cur);cur=w;}else cur=t;});lines.push(cur);
    const lh=Math.max(12,fs*1.3),tot=(lines.length-1)*lh,yOff=rids.has(fn.id)?-r*0.2:0;
    lines.forEach((l,i)=>g.fillText(l,cx,cy+yOff-tot/2+i*lh));
    g.font=`600 ${Math.max(8,9*Math.min(sc,1))}px "Segoe UI",system-ui`;g.fillStyle=col.stroke;g.fillText(col.badge,cx,cy+r*0.56);
    const used=new Set();coups.forEach(cc=>{if(cc.source_function_id===fn.id)used.add(cc.source_aspect||'O');if(cc.target_function_id===fn.id)used.add(cc.target_aspect||'I');});
    used.forEach(asp=>{const a=(AV[asp]??0)*Math.PI/3;const[bx2,by2]=ws(fn.x+HR*Math.cos(a),fn.y+HR*Math.sin(a));g.beginPath();g.arc(bx2,by2,4.5*sc,0,Math.PI*2);g.fillStyle=AC[asp];g.fill();});
    g.restore();
  });
  g.save();g.fillStyle='rgba(0,0,0,0.18)';g.font='11px "Segoe UI",system-ui';g.textAlign='right';g.fillText('DGR-FRAM Modeler · '+new Date().toLocaleDateString('pt-BR'),W-12,H-9);g.restore();
  return oc;
}

  doc.text('Diagrama Funcional FRAM',PW/2,13,{align:'center'});
  let mnX=Infinity,mnY=Infinity,mxX=-Infinity,mxY=-Infinity;
  fns.forEach(fn=>{mnX=Math.min(mnX,fn.x-HR*1.8);mnY=Math.min(mnY,fn.y-HR*1.8);mxX=Math.max(mxX,fn.x+HR*1.8);mxY=Math.max(mxY,fn.y+HR*1.8);});
  if(!fns.length){mnX=0;mnY=0;mxX=1600;mxY=900;}
  const bW=mxX-mnX,bH=mxY-mnY;
  const sc=Math.min(1700/bW,1000/bH,1.5);
  const px2=(1760-(bW*sc))/2-mnX*sc,py2=(1040-(bH*sc))/2-mnY*sc;
  const oc=renderOff(1760,1040,px2,py2,sc);
  doc.addImage(oc.toDataURL('image/png'),'PNG',5,17,PW-10,PH-22);
  // MC results
  if(Object.keys(mcRes).length){
    doc.addPage();wbg();
    doc.setTextColor(83,74,183);doc.setFontSize(13);doc.setFont('helvetica','bold');
    doc.text('Simulação Monte Carlo — Resultados por Função (ranking por P95)',PW/2,13,{align:'center'});
    let y=24;
    [...fns].filter(f=>mcRes[f.id]).sort((a,b)=>mcRes[b.id].p95-mcRes[a.id].p95).forEach(fn=>{
      if(y>PH-16){doc.addPage();wbg();y=16;}
      const r=mcRes[fn.id],p=r.p95;
      const[rc,gc,bc]=p>=0.70?[192,57,43]:p>=0.50?[133,79,11]:p>=0.30?[83,74,183]:[15,110,86];
      doc.setTextColor(rc,gc,bc);doc.setFontSize(11);doc.setFont('helvetica','bold');
      doc.text(fn.name,10,y);
      doc.setFillColor(rc,gc,bc);doc.rect(105,y-3.5,(PW-115)*Math.min(p,1),4,'F');
      doc.setTextColor(70,70,100);doc.setFontSize(8);doc.setFont('helvetica','normal');
      doc.text(`VFR média=${pct(r.mean)} | P90=${pct(r.p90)} | P95(LC)=${pct(r.p95)} | P99=${pct(r.p99)} | Prob.Crit=${pct(r.probCrit)} | IP=${pct(r.ip)} | IIS=${pct(r.iis)}`,10,y+5);
      y+=13;
    });
  }
  doc.save('dgr-fram-relatorio.pdf');
}

function dl(c,m,f){const b=new Blob([c],{type:m});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download=f;a.click();URL.revokeObjectURL(u);}

function impJSON(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();r.onload=ev=>{try{loadData(JSON.parse(ev.target.result));}catch(err){alert('JSON inválido: '+err.message);}e.target.value='';};r.readAsText(f);
}
function loadData(d){
  fns=(d.functions||[]).map(fn=>{const l=(d.layouts||[]).find(l=>l.function_id===fn.id)||{x:300,y:300};return{...fn,x:fn.x??l.x??300,y:fn.y??l.y??300,style:fn.style||'red'};});
  coups=d.couplings||[];vars=d.variabilities||[];resEvs=d.resonanceEvents||[];govM=d.governanceMechanisms||[];
  params=d.params||{};mcRes=d.monteCarlo||{};
  fns.forEach(fn=>initP(fn.id));
  selFn=null;connSrc=null;closePn();renderSB();draw();
  if(fns.length){
    let mnX=Infinity,mnY=Infinity,mxX=-Infinity,mxY=-Infinity;
    fns.forEach(fn=>{mnX=Math.min(mnX,fn.x);mnY=Math.min(mnY,fn.y);mxX=Math.max(mxX,fn.x);mxY=Math.max(mxY,fn.y);});
    const bW=mxX-mnX+HR*4,bH=mxY-mnY+HR*4;
    scale=Math.min(CW.offsetWidth/bW,CW.offsetHeight/bH,1.3);
    panX=CW.offsetWidth/2-(mnX+(mxX-mnX)/2)*scale;panY=CW.offsetHeight/2-(mnY+(mxY-mnY)/2)*scale;draw();
  }
}
function impXFMV(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();r.onload=ev=>{
    try{
      const xml=new DOMParser().parseFromString(ev.target.result,'text/xml');
      const idMap={},nf=[];
      xml.querySelectorAll('Function').forEach(el=>{
        const idn=el.querySelector('IDNr')?.textContent||'0';
        const sa=el.getAttribute('style')||'';const st=sa==='red'?'red':sa==='green'?'green':sa==='grey'?'grey':'white';
        const id=uid();idMap[idn]=id;
        nf.push({id,name:el.querySelector('IDName')?.textContent||'Função',description:el.querySelector('Description')?.textContent||'',input:'',output:'',precondition:'',resource:'',control:'',time:'',criticality:3,coupling_degree:3,status:'ativa',style:st,x:parseFloat(el.getAttribute('x'))||300,y:parseFloat(el.getAttribute('y'))||300});
      });
      const nc=[];
      xml.querySelectorAll('Aspect').forEach(el=>{
        const pts=(el.querySelector('Name')?.textContent||'').split('|');
        if(pts.length>=4){const si=idMap[pts[0]],ti=idMap[pts[2]];if(si&&ti&&si!==ti)nc.push({id:uid(),source_function_id:si,target_function_id:ti,source_aspect:'O',target_aspect:pts[3]||'I',label:pts[1]||'',line_type:'normal',created_date:new Date().toISOString()});}
      });
      loadData({functions:nf,couplings:nc,variabilities:[],resonanceEvents:[],governanceMechanisms:[]});
    }catch(err){alert('Erro XFMV: '+err.message);}
    e.target.value='';
  };r.readAsText(f);
}
function clearAll(){
  if(!confirm('Limpar todo o modelo?'))return;
  fns=[];coups=[];vars=[];resEvs=[];govM=[];params={};mcRes={};
  selFn=null;animOn=false;closePn();renderSB();draw();
  if(curTab==='mc')renderMC();
}
